<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briscola a 5 - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="icon" type="image/png" href="logo.png">

    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="manifest" href="manifest.json">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Briscola a 5 - Tracker">
    <meta property="og:description" content="Traccia i punteggi e i campionati delle tue partite a Briscola a 5 in tempo reale.">
    <meta property="og:image" content="https://matteobuttazzi04.github.io/punti-briscola/logo.png">
    <meta property="og:url" content="https://matteobuttazzi04.github.io/punti-briscola/">

    <style>
        /* Forza modalità giorno assoluta */
        :root { color-scheme: light !important; }
        html, body { 
            background-color: #f8fafc !important; 
            color: #0f172a !important; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .card-white { background-color: #ffffff !important; color: #0f172a !important; }
        .active-tap:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* Stile specifico per la schermata di caricamento iniziale (Splash Screen) */
        #splash-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            z-index: 9999;
        }
        .pulse-animation {
            animation: customPulse 1.6s infinite ease-in-out;
        }
        @keyframes customPulse {
            0%, 100% { opacity: 0.6; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1.04); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div id="splash-screen">
            <img src="logo.png" alt="Logo" class="w-32 h-32 object-contain mb-4 rounded-3xl shadow-md pulse-animation" onerror="this.style.display='none'; document.getElementById('fallback-text').style.display='block';">
            <div id="fallback-text" class="hidden text-indigo-600 font-black text-6xl mb-4 pulse-animation">♦️♣️</div>
            <div class="text-indigo-600 font-black text-xs uppercase tracking-widest pulse-animation">Caricamento Live...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZcKB7Ey13VBtlsqtSGQe-g6IeFoRl9CQ",
            authDomain: "punti-briscola.firebaseapp.com",
            projectId: "punti-briscola",
            storageBucket: "punti-briscola.firebasestorage.app",
            messagingSenderId: "1002667837210",
            appId: "1:1002667837210:web:9c40049437cf0976f10ea3"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fb = { collection, doc, setDoc, deleteDoc, onSnapshot, signInAnonymously, onAuthStateChanged };
        window.appId = "punti-briscola";
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [isConnected, setIsConnected] = useState(false);
            const [players, setPlayers] = useState([]);
            const [tables, setTables] = useState([]);
            const [activeTableId, setActiveTableId] = useState(null);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newTableName, setNewTableName] = useState('');
            const [selectedPlayers, setSelectedPlayers] = useState([]);

            const baseP = ['artifacts', window.appId, 'public', 'data'];

            useEffect(() => {
                return window.fb.onAuthStateChanged(window.auth, (u) => {
                    if (!u) window.fb.signInAnonymously(window.auth);
                    setUser(u);
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubP = window.fb.onSnapshot(window.fb.collection(window.db, ...baseP, 'players'), (s) => {
                    setPlayers(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsConnected(true);
                }, () => setIsConnected(false));

                const unsubT = window.fb.onSnapshot(window.fb.collection(window.db, ...baseP, 'tables'), (s) => {
                    setTables(s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.ts - b.ts));
                });
                return () => { unsubP(); unsubT(); };
            }, [user]);

            const calculateWins = (pid) => tables.reduce((acc, t) => acc + (t.players.find(p => p.id === pid)?.score || 0), 0);

            const addPlayer = async () => {
                if (!newPlayerName.trim()) return;
                await window.fb.setDoc(window.fb.doc(window.db, ...baseP, 'players', Date.now().toString()), { 
                    name: newPlayerName.trim(),
                    championshipPoints: 0 
                });
                setNewPlayerName('');
            };

            const createTable = async () => {
                if (selectedPlayers.length !== 5 || !newTableName) return;
                const id = Date.now().toString();
                await window.fb.setDoc(window.fb.doc(window.db, ...baseP, 'tables', id), {
                    name: newTableName, ts: Date.now(),
                    players: selectedPlayers.map(p => ({ id: p.id, name: p.name, score: 0 })),
                    logs: []
                });
                setSelectedPlayers([]); setNewTableName(''); setView('home');
            };

            const renameTable = async (tid, currentName) => {
                const newName = prompt("Modifica il nome del tavolo:", currentName);
                if (!newName || !newName.trim() || newName.trim() === currentName) return;
                const t = tables.find(x => x.id === tid);
                await window.fb.setDoc(window.fb.doc(window.db, ...baseP, 'tables', tid), { 
                    ...t, 
                    name: newName.trim() 
                });
            };

            const updateScore = async (tid, pid, delta) => {
                const t = tables.find(x => x.id === tid);
                const player = t.players.find(p => p.id === pid);
                if (delta < 0 && player.score === 0) return;

                const newP = t.players.map(p => p.id === pid ? { ...p, score: Math.max(0, p.score + delta) } : p);
                
                const nowStr = new Date().toLocaleString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                const logEntry = `${delta > 0 ? '+' : ''}${delta} (${player.name}) ${nowStr}`;
                const currentLogs = t.logs || [];
                const newLogs = [logEntry, ...currentLogs].slice(0, 50);

                await window.fb.setDoc(window.fb.doc(window.db, ...baseP, 'tables', tid), { ...t, players: newP, logs: newLogs });
            };

            const endChampionship = async (tid) => {
                const t = tables.find(x => x.id === tid);
                if (!t) return;

                let maxScore = -1;
                t.players.forEach(p => { if (p.score > maxScore) maxScore = p.score; });

                if (maxScore <= 0) {
                    alert("Impossibile terminare: nessun giocatore ha fatto punti in questo campionato!");
                    return;
                }

                if (!confirm("Vuoi terminare il campionato attuale? I punteggi odierni verranno azzerati e verrà assegnato +1 Punto Campionato ai vincitori.")) return;

                const winners = t.players.filter(p => p.score === maxScore);

                for (const w of winners) {
                    const pDoc = players.find(x => x.id === w.id);
                    const currentCPoints = pDoc?.championshipPoints || 0;
                    await window.fb.setDoc(window.fb.doc(window.db, ...baseP, 'players', w.id), {
                        ...pDoc,
                        championshipPoints: currentCPoints + 1
                    });
                }

                const resetPlayers = t.players.map(p => ({ ...p, score: 0 }));
                const nowStr = new Date().toLocaleString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                const winnersNames = winners.map(w => w.name).join(', ');
                const endLog = `🏆 Campionato Terminato! Vincitore: ${winnersNames} (${nowStr})`;
                const newLogs = [endLog, ...(t.logs || [])].slice(0, 50);

                await window.fb.setDoc(window.fb.doc(window.db, ...baseP, 'tables', tid), {
                    ...t,
                    players: resetPlayers,
                    logs: newLogs
                });
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32 p-6 bg-slate-50">
                    {!isConnected && (
                        <div className="fixed top-0 left-0 right-0 bg-red-500 text-white text-[10px] font-bold py-1 text-center z-[100] animate-pulse uppercase tracking-widest">
                            Connessione in corso...
                        </div>
                    )}

                    {view === 'home' && (
                        <div className="space-y-6">
                            <div className="flex justify-between items-center">
                                <h1 className="text-3xl font-black text-slate-800">I Tavoli</h1>
                                <button onClick={() => setView('new-table')} className="bg-indigo-600 text-white p-3 rounded-2xl shadow-xl active-tap"><Icon name="plus" /></button>
                            </div>
                            <div className="grid gap-4">
                                {tables.map(t => (
                                    <div key={t.id} onClick={() => { setActiveTableId(t.id); setView('detail'); }} className="card-white p-5 rounded-[2rem] border border-slate-200 shadow-sm active-tap">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-xl">{t.name}</h3>
                                            <Icon name="chevron-right" className="text-slate-300" />
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {t.players.sort((a,b) => b.score - a.score).map(p => (
                                                <span key={p.id} className="text-[10px] bg-slate-50 px-3 py-1.5 rounded-full font-black uppercase tracking-tight border border-slate-100">
                                                    {p.name}: <span className="text-indigo-600">{p.score}</span>
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                {tables.length === 0 && isConnected && <p className="text-center text-slate-400 py-20 italic">Nessun tavolo attivo.</p>}
                            </div>
                        </div>
                    )}

                    {view === 'players' && (
                        <div className="space-y-6">
                            <h1 className="text-3xl font-black text-slate-800">Anagrafica</h1>
                            <div className="flex gap-2 p-2 card-white rounded-2xl border border-slate-200">
                                <input className="flex-1 px-3 outline-none bg-transparent" placeholder="Nuovo nome..." value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} />
                                <button onClick={addPlayer} className="bg-indigo-600 text-white px-5 py-3 rounded-xl font-bold active-tap">OK</button>
                            </div>
                            <div className="space-y-3">
                                {players.sort((a,b) => (b.championshipPoints || 0) - (a.championshipPoints || 0)).map((p, i) => (
                                    <div key={p.id} className="card-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                                        <div className="flex items-center gap-4">
                                            <span className="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full font-black text-xs">{i+1}</span>
                                            <div>
                                                <p className="font-bold text-lg">{p.name}</p>
                                                <div className="flex flex-col gap-0.5 text-[10px] font-black uppercase tracking-wide">
                                                    <span className="text-amber-600 flex items-center gap-1">🏆 Campionati vinti: {p.championshipPoints || 0}</span>
                                                    <span className="text-slate-400">Punti totali nei tavoli: {calculateWins(p.id)}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={() => window.fb.deleteDoc(window.fb.doc(window.db, ...baseP, 'players', p.id))} className="text-red-300 p-2 active-tap"><Icon name="trash-2" size={18}/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'new-table' && (
                        <div className="space-y-6">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setView('home')} className="p-2 bg-white rounded-xl border"><Icon name="arrow-left" /></button>
                                <h1 className="text-2xl font-black">Nuova Partita</h1>
                            </div>
                            <input className="w-full p-5 bg-white border border-slate-200 rounded-3xl outline-none shadow-sm" placeholder="Nome tavolo..." value={newTableName} onChange={e => setNewTableName(e.target.value)} />
                            <div className="grid grid-cols-2 gap-2">
                                {players.map(p => {
                                    const isS = selectedPlayers.find(x => x.id === p.id);
                                    return (
                                        <button key={p.id} onClick={() => isS ? setSelectedPlayers(s => s.filter(x => x.id !== p.id)) : selectedPlayers.length < 5 && setSelectedPlayers(s => [...s, p])}
                                            className={`p-4 rounded-2xl border-2 font-bold transition-all text-left ${isS ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-100 bg-white'}`}>
                                            {p.name}
                                        </button>
                                    );
                                })}
                            </div>
                            <button disabled={selectedPlayers.length !== 5 || !newTableName} onClick={createTable} className="w-full bg-emerald-500 text-white py-5 rounded-[2rem] font-black text-xl active-tap disabled:opacity-20 mt-4">INIZIA</button>
                        </div>
                    )}

                    {view === 'detail' && activeTableId && (() => {
                        const currentTable = tables.find(x => x.id === activeTableId);
                        if (!currentTable) return null;
                        return (
                            <div className="space-y-6">
                                 <div className="flex justify-between items-center">
                                    <button onClick={() => setView('home')} className="p-3 bg-white rounded-2xl border active-tap"><Icon name="arrow-left" /></button>
                                    <div className="flex items-center gap-2">
                                        <h1 className="font-black text-xl">{currentTable.name}</h1>
                                        <button onClick={() => renameTable(activeTableId, currentTable.name)} className="text-indigo-600 p-1 active-tap"><Icon name="edit-2" size={16} /></button>
                                    </div>
                                    <button onClick={() => { if(confirm("Chiudere il tavolo?")) { window.fb.deleteDoc(window.fb.doc(window.db, ...baseP, 'tables', activeTableId)); setView('home'); }}} className="text-red-400 p-2 active-tap"><Icon name="trash-2" /></button>
                                </div>
                                <div className="space-y-3">
                                    {currentTable.players.map(p => (
                                        <div key={p.id} className="card-white p-5 rounded-[2.5rem] border border-slate-100 flex justify-between items-center shadow-sm">
                                            <div className="flex-1">
                                                <p className="font-black text-2xl">{p.name}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">Record Assoluto: {calculateWins(p.id)}</p>
                                            </div>
                                            <div className="flex items-center gap-4 bg-slate-50 p-2 rounded-3xl border border-slate-100">
                                                <button onClick={() => updateScore(activeTableId, p.id, -1)} className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center font-black text-2xl active-tap" disabled={p.score === 0}>-</button>
                                                <span className="w-8 text-center text-3xl font-black text-indigo-600">{p.score}</span>
                                                <button onClick={() => updateScore(activeTableId, p.id, 1)} className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center font-black text-2xl active-tap">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button onClick={() => endChampionship(activeTableId)} className="w-full bg-gradient-to-r from-amber-500 to-yellow-500 text-white py-4 rounded-2xl font-black shadow-lg active-tap flex items-center justify-center gap-2 mt-4 text-sm uppercase tracking-wider">
                                    <Icon name="trophy" size={18}/> Termina Campionato
                                </button>

                                <div className="mt-6 pt-4 border-t border-slate-200">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-1">
                                        <Icon name="history" size={14}/> Cronologia Movimenti
                                    </h3>
                                    <div className="bg-white rounded-2xl border border-slate-200 p-4 max-h-48 overflow-y-auto space-y-2 shadow-inner">
                                        {currentTable.logs && currentTable.logs.length > 0 ? (
                                            currentTable.logs.map((log, index) => (
                                                <div key={index} className={`text-xs font-medium py-1 border-b border-slate-100 last:border-none ${log.startsWith('🏆') ? 'text-amber-600 font-bold bg-amber-50 p-2 rounded-lg' : 'text-slate-600'}`}>
                                                    {log}
                                                </div>
                                            ))
                                        ) : (
                                            <p className="text-xs text-slate-400 italic text-center py-4">Nessun movimento registrato.</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    <nav className="fixed bottom-6 left-6 right-6 bg-slate-900 text-white rounded-[2.5rem] px-10 py-5 flex justify-between items-center z-50 shadow-2xl">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 ${view !== 'players' ? 'text-indigo-400' : 'text-slate-500'}`}>
                            <Icon name="grid" size={24} />
                        </button>
                        <button onClick={() => setView('players')} className={`flex flex-col items-center gap-1 ${view === 'players' ? 'text-indigo-400' : 'text-slate-500'}`}>
                            <Icon name="users" size={24} />
                        </button>
                        <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${isConnected ? 'bg-emerald-400' : 'bg-red-500 animate-pulse'}`}></div>
                            <span className="text-[8px] font-black">{isConnected ? "LIVE" : "OFF"}</span>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
