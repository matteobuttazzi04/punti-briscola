```html
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Briscola a 5 - Live Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZcKB7Ey13VBtlsqtSGQe-g6IeFoRl9CQ",
            authDomain: "punti-briscola.firebaseapp.com",
            projectId: "punti-briscola",
            storageBucket: "punti-briscola.firebasestorage.app",
            messagingSenderId: "1002667837210",
            appId: "1:1002667837210:web:9c40049437cf0976f10ea3",
            measurementId: "G-SFZEH4C7HR"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fb = { collection, doc, setDoc, deleteDoc, onSnapshot, signInAnonymously, onAuthStateChanged, query };
        window.appId = "punti-briscola";
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [view, setView] = useState('home');
            const [user, setUser] = useState(null);
            const [isConnected, setIsConnected] = useState(false);
            const [players, setPlayers] = useState([]);
            const [tables, setTables] = useState([]);
            const [activeTableId, setActiveTableId] = useState(null);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newTableName, setNewTableName] = useState('');
            const [selectedPlayers, setSelectedPlayers] = useState([]);

            // Percorsi corretti per le regole di sicurezza
            const playersPath = ['artifacts', window.appId, 'public', 'data', 'players'];
            const tablesPath = ['artifacts', window.appId, 'public', 'data', 'tables'];

            useEffect(() => {
                const unsubscribe = window.fb.onAuthStateChanged(window.auth, async (u) => {
                    if (!u) {
                        try { await window.fb.signInAnonymously(window.auth); } 
                        catch (e) { console.error("Auth failed", e); }
                    }
                    setUser(u);
                });
                return unsubscribe;
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const pRef = window.fb.collection(window.db, ...playersPath);
                const tRef = window.fb.collection(window.db, ...tablesPath);

                const unsubP = window.fb.onSnapshot(pRef, (snap) => {
                    setPlayers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setIsConnected(true);
                }, (err) => {
                    console.error("Players Sync Error:", err);
                    setIsConnected(false);
                });

                const unsubT = window.fb.onSnapshot(tRef, (snap) => {
                    setTables(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.ts - a.ts));
                }, (err) => {
                    console.error("Tables Sync Error:", err);
                });

                return () => { unsubP(); unsubT(); };
            }, [user]);

            const calculateWins = (pid) => {
                return tables.reduce((acc, t) => acc + (t.players.find(p => p.id === pid)?.score || 0), 0);
            };

            const addPlayer = async () => {
                if (!newPlayerName.trim() || !isConnected) return;
                const id = Date.now().toString();
                await window.fb.setDoc(window.fb.doc(window.db, ...playersPath, id), { 
                    name: newPlayerName.trim(),
                    ts: Date.now()
                });
                setNewPlayerName('');
            };

            const createTable = async () => {
                if (selectedPlayers.length !== 5 || !newTableName || !isConnected) return;
                const tid = Date.now().toString();
                await window.fb.setDoc(window.fb.doc(window.db, ...tablesPath, tid), {
                    name: newTableName,
                    ts: Date.now(),
                    players: selectedPlayers.map(p => ({ id: p.id, name: p.name, score: 0 }))
                });
                setSelectedPlayers([]);
                setNewTableName('');
                setView('home');
            };

            const updateScore = async (tid, pid, delta) => {
                if (!isConnected) return;
                const t = tables.find(x => x.id === tid);
                const newP = t.players.map(p => p.id === pid ? { ...p, score: Math.max(0, p.score + delta) } : p);
                await window.fb.setDoc(window.fb.doc(window.db, ...tablesPath, tid), { ...t, players: newP });
            };

            const deletePlayer = async (id) => {
                if(confirm("Eliminare definitivamente il giocatore?")) {
                    await window.fb.deleteDoc(window.fb.doc(window.db, ...playersPath, id));
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 p-6 font-sans">
                    {view === 'home' && (
                        <div className="space-y-6 animate-in">
                            <div className="flex justify-between items-center">
                                <h1 className="text-2xl font-bold">I Tuoi Tavoli</h1>
                                <button onClick={() => setView('new-table')} className="bg-indigo-600 text-white p-2.5 rounded-xl shadow-lg active:scale-95 transition-transform"><Icon name="plus" /></button>
                            </div>
                            <div className="space-y-4">
                                {tables.length === 0 && isConnected && (
                                    <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-3xl opacity-50">
                                        <Icon name="layers" size={40} className="mx-auto mb-2 text-slate-300"/>
                                        <p>Nessun tavolo creato</p>
                                    </div>
                                )}
                                {tables.map(t => (
                                    <div key={t.id} onClick={() => { setActiveTableId(t.id); setView('detail'); }} className="bg-white dark:bg-slate-900 p-5 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 active:scale-[0.98] transition-all">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-lg">{t.name}</h3>
                                            <Icon name="chevron-right" className="text-slate-400" />
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {t.players.sort((a,b) => b.score - a.score).map(p => (
                                                <span key={p.id} className="text-xs bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-full font-bold">
                                                    {p.name}: <span className="text-indigo-600 dark:text-indigo-400">{p.score}</span>
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'players' && (
                        <div className="space-y-6 animate-in">
                            <h1 className="text-2xl font-bold">Giocatori</h1>
                            <div className="flex gap-2 bg-white dark:bg-slate-900 p-2 rounded-2xl border border-slate-200 dark:border-slate-800">
                                <input className="flex-1 p-2 bg-transparent outline-none" placeholder="Nome nuovo amico..." value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} />
                                <button onClick={addPlayer} className="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold active:scale-95 transition-transform">Aggiungi</button>
                            </div>
                            <div className="space-y-3">
                                {players.sort((a,b) => calculateWins(b.id) - calculateWins(a.id)).map((p, idx) => (
                                    <div key={p.id} className="bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 flex justify-between items-center shadow-sm">
                                        <div className="flex items-center gap-3">
                                            <span className="w-8 h-8 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-full text-xs font-black">{idx+1}</span>
                                            <div>
                                                <p className="font-bold">{p.name}</p>
                                                <p className="text-[10px] text-indigo-600 dark:text-indigo-400 font-black uppercase tracking-wider">Vittorie: {calculateWins(p.id)}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => deletePlayer(p.id)} className="text-red-400 p-2"><Icon name="trash-2" size={18}/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'new-table' && (
                        <div className="space-y-6 animate-in">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setView('home')} className="p-2"><Icon name="arrow-left" /></button>
                                <h1 className="text-2xl font-bold">Nuovo Tavolo</h1>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-slate-400 uppercase ml-2">Nome della sessione</label>
                                <input className="w-full p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl outline-none focus:border-indigo-500" placeholder="es. Venerdì al Bar" value={newTableName} onChange={e => setNewTableName(e.target.value)} />
                            </div>
                            <div className="space-y-2">
                                <p className="text-xs font-bold text-slate-400 uppercase ml-2">Seleziona 5 giocatori ({selectedPlayers.length}/5)</p>
                                <div className="grid grid-cols-2 gap-2">
                                    {players.map(p => {
                                        const isS = selectedPlayers.find(x => x.id === p.id);
                                        return (
                                            <button key={p.id} onClick={() => isS ? setSelectedPlayers(s => s.filter(x => x.id !== p.id)) : selectedPlayers.length < 5 && setSelectedPlayers(s => [...s, p])}
                                                className={`p-4 rounded-2xl border-2 text-left font-bold transition-all ${isS ? 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-700 dark:text-indigo-300' : 'border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900'}`}>
                                                {p.name}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            <button disabled={selectedPlayers.length !== 5 || !newTableName} onClick={createTable} className="w-full bg-emerald-500 text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-emerald-200 dark:shadow-none active:scale-[0.98] disabled:opacity-30 transition-all">
                                INIZIA PARTITA
                            </button>
                        </div>
                    )}

                    {view === 'detail' && activeTableId && (
                        <div className="space-y-6 animate-in">
                             <div className="flex justify-between items-center">
                                <button onClick={() => setView('home')} className="p-2 bg-white dark:bg-slate-900 rounded-xl border shadow-sm"><Icon name="arrow-left" /></button>
                                <h1 className="font-black text-lg">{tables.find(x => x.id === activeTableId)?.name}</h1>
                                <button onClick={() => { if(confirm("Chiudere il tavolo definitivamente?")) { window.fb.deleteDoc(window.fb.doc(window.db, ...tablesPath, activeTableId)); setView('home'); }}} className="text-red-400 p-2"><Icon name="trash-2" /></button>
                            </div>
                            <div className="space-y-3">
                                {tables.find(x => x.id === activeTableId)?.players.map(p => (
                                    <div key={p.id} className="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800 flex justify-between items-center shadow-sm">
                                        <div className="flex-1">
                                            <p className="font-black text-xl">{p.name}</p>
                                            <div className="flex items-center gap-1 text-indigo-500 font-bold text-[10px] uppercase mt-1">
                                                <Icon name="trophy" size={10}/> Totale: {calculateWins(p.id)}
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4 bg-slate-50 dark:bg-slate-800 p-2 rounded-2xl border border-slate-100 dark:border-slate-700">
                                            <button onClick={() => updateScore(activeTableId, p.id, -1)} className="w-12 h-12 bg-white dark:bg-slate-900 rounded-xl flex items-center justify-center font-black shadow-sm text-2xl" disabled={p.score === 0}>-</button>
                                            <div className="w-10 text-center">
                                                <span className="text-2xl font-black text-indigo-600 dark:text-indigo-400 block">{p.score}</span>
                                                <span className="text-[8px] font-black uppercase text-slate-400">Oggi</span>
                                            </div>
                                            <button onClick={() => updateScore(activeTableId, p.id, 1)} className="w-12 h-12 bg-indigo-600 text-white rounded-xl flex items-center justify-center font-black shadow-lg text-2xl">+</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl border border-indigo-100 dark:border-indigo-800 flex gap-3 text-xs text-indigo-700 dark:text-indigo-300">
                                <Icon name="info" size={16} className="shrink-0" />
                                <p>Briscola a 5: aggiungi <strong>+1</strong> al chiamante e al chiamato che vincono il round.</p>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-8 py-4 flex justify-around items-center z-50">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 ${view !== 'players' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <Icon name="layout-grid" size={24} />
                            <span className="text-[10px] font-black">TAVOLI</span>
                        </button>
                        <button onClick={() => setView('players')} className={`flex flex-col items-center gap-1 ${view === 'players' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <Icon name="users" size={24} />
                            <span className="text-[10px] font-black">PLAYERS</span>
                        </button>
                        <div className="flex flex-col items-center gap-1">
                            <Icon name={isConnected ? "zap" : "zap-off"} className={isConnected ? "text-emerald-500 fill-emerald-500" : "text-red-500"} size={20}/>
                            <span className="text-[8px] font-black">{isConnected ? "LIVE" : "OFF"}</span>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
